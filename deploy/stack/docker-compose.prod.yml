# =============================================================================
# Production Environment Overrides (EA)
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env.prod -p makapix-prod up -d
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  db:
    container_name: makapix-prod-db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
      - ../../db/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ../../db/init-users.sh:/docker-entrypoint-initdb.d/20-init-users.sh:ro

  # ---------------------------------------------------------------------------
  # Cache
  # ---------------------------------------------------------------------------
  cache:
    container_name: makapix-prod-cache

  # ---------------------------------------------------------------------------
  # MQTT - Production on port 8883
  # ---------------------------------------------------------------------------
  mqtt:
    container_name: makapix-prod-mqtt
    environment:
      # Consumed by gen-certs.sh so a freshly minted broker cert always
      # carries this environment's public MQTT hostname in its SANs.
      MQTT_PUBLIC_HOST: makapix.club
    ports:
      # Plaintext listener bound to loopback only: its security model is "docker
      # network isolation", so it must not be reachable from the internet
      # (Docker's iptables rules bypass ufw). In-container clients reach the
      # broker over the compose network; physical players use 8883 mTLS.
      - "127.0.0.1:1883:1883"
      - "8883:8883"

  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------
  api:
    container_name: makapix-prod-api
    environment:
      # Container name, not the "mqtt" service alias: both environments'
      # brokers carry the alias "mqtt" on the shared caddy_net, so from a
      # container attached to caddy_net it resolves to either broker.
      MQTT_BROKER_HOST: makapix-prod-mqtt
      MQTT_PUBLIC_HOST: makapix.club
      MQTT_PUBLIC_PORT: 8883
      # Mobile push (FCM): in-container path to the Firebase service-account key.
      FCM_CREDENTIALS_FILE: /run/secrets/fcm.json
    volumes:
      # Host path set in .env.prod (kept outside the repo). Read-only.
      - ${FCM_CREDENTIALS_HOST_PATH:-/dev/null}:/run/secrets/fcm.json:ro

  # ---------------------------------------------------------------------------
  # Worker
  # ---------------------------------------------------------------------------
  worker:
    container_name: makapix-prod-worker
    environment:
      # Mobile push (FCM): the worker performs the actual sends.
      FCM_CREDENTIALS_FILE: /run/secrets/fcm.json
    volumes:
      - ${FCM_CREDENTIALS_HOST_PATH:-/dev/null}:/run/secrets/fcm.json:ro

  # ---------------------------------------------------------------------------
  # Web - Production routing for makapix.club
  # ---------------------------------------------------------------------------
  web:
    container_name: makapix-prod-web
    build:
      context: ../..
      dockerfile: web/Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://makapix.club
        - NEXT_PUBLIC_MQTT_WS_URL=wss://makapix.club/mqtt
        - NEXT_PUBLIC_MQTT_WEBCLIENT_PASSWORD=${MQTT_WEBCLIENT_PASSWORD}
    environment:
      - NEXT_PUBLIC_API_BASE_URL=https://makapix.club
      - NEXT_PUBLIC_MQTT_WS_URL=wss://makapix.club/mqtt
      - NEXT_PUBLIC_MQTT_WEBCLIENT_PASSWORD=${MQTT_WEBCLIENT_PASSWORD}
    labels:
      caddy: makapix.club
      # Route /api/* to FastAPI backend
      caddy.@api.path: /api/*
      caddy.handle_0: "@api"
      caddy.handle_0.handle_path: /api/*
      # Bound request bodies at the edge (artwork <=5MB, mkpx <=50MB app-enforced;
      # this stops larger bodies from ever spooling to the API container).
      caddy.handle_0.handle_path.request_body.max_size: 64MB
      caddy.handle_0.handle_path.reverse_proxy: makapix-prod-api:8000
      # MQTT WebSocket proxy
      caddy.@mqtt.path: /mqtt
      caddy.handle_1: "@mqtt"
      caddy.handle_1.reverse_proxy: makapix-prod-mqtt:9001
      # Default: proxy to Next.js
      caddy.handle_2.reverse_proxy: "{{upstreams 3000}}"

  # ---------------------------------------------------------------------------
  # Vault HTTP - Production (placeholder)
  #
  # vault.makapix.club is now served directly by Caddy via manual site
  # blocks in caddy/Caddyfile.global (using Caddy's existing read-only mount
  # of /mnt/vault-1 -> /srv/vault-prod). This container is a no-op kept only
  # so that `docker compose up` doesn't error on a missing service reference.
  # ---------------------------------------------------------------------------
  vault:
    container_name: makapix-prod-vault

  # ---------------------------------------------------------------------------
  # WWW Redirect
  # ---------------------------------------------------------------------------
  www-redirect:
    container_name: makapix-prod-www-redirect

  # ---------------------------------------------------------------------------
  # Piskel Editor
  # ---------------------------------------------------------------------------
  piskel:
    container_name: makapix-prod-piskel
    labels:
      caddy: piskel.makapix.club
      caddy.encode: "gzip zstd"
      caddy.header.X-Content-Type-Options: "nosniff"
      caddy.header.Content-Security-Policy: "frame-ancestors 'self' https://makapix.club"
      caddy.reverse_proxy: "{{upstreams 80}}"

  # ---------------------------------------------------------------------------
  # Pixelc Editor
  # ---------------------------------------------------------------------------
  pixelc:
    container_name: makapix-prod-pixelc
    labels:
      caddy: pixelc.makapix.club
      caddy.encode: "gzip zstd"
      caddy.header.X-Content-Type-Options: "nosniff"
      caddy.header.Cross-Origin-Opener-Policy: "same-origin"
      caddy.header.Cross-Origin-Embedder-Policy: "require-corp"
      caddy.header.Content-Security-Policy: "frame-ancestors 'self' https://makapix.club"
      caddy.reverse_proxy: "{{upstreams 80}}"

  # ---------------------------------------------------------------------------
  # Redis (rate limiting)
  # ---------------------------------------------------------------------------
  redis:
    container_name: makapix-prod-redis

volumes:
  pg_data_prod:
    external: true
    name: makapix_pg_data
